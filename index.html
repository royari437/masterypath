<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MasteryPath v5.0 - Social Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d1117; --surface: #161b22; --primary: #58a6ff;
            --accent: #238636; --text: #c9d1d9; --text-dim: #8b949e; --gold: #f1e05a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 1100px; margin: auto; display: grid; grid-template-columns: 300px 1fr 300px; gap: 20px; }
        .card { background: var(--surface); padding: 20px; border-radius: 15px; border: 1px solid #30363d; margin-bottom: 20px; }
        
        /* Stats */
        .stat-val { font-size: 18px; font-weight: 800; display: block; color: var(--primary); }
        .stat-box { background: #0d1117; padding: 10px; border-radius: 10px; margin-top: 10px; border: 1px solid #21262d; }

        /* Forms */
        label { display: block; font-size: 10px; margin-bottom: 5px; color: var(--text-dim); text-transform: uppercase; }
        input, select { width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 8px; background: #0d1117; border: 1px solid #30363d; color: white; outline: none; font-size: 13px; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-primary { background: var(--primary); color: #000; }
        .btn-add { background: var(--accent); color: white; }

        /* Social Feed Items */
        .feed-item { background: #0d1117; padding: 12px; border-radius: 10px; margin-bottom: 10px; border-left: 3px solid var(--gold); animation: slideIn 0.3s ease-out; }
        .quest-item { background: #0d1117; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #30363d; }
        
        @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }

        @media (max-width: 1000px) { .container { grid-template-columns: 1fr; } .side { display: none; } }
    </style>
</head>
<body>

<div id="auth-screen" class="login-overlay" style="display: none;">
    <h1 style="color: var(--primary); font-size: 40px; margin-bottom: 10px;">MasteryPath</h1>
    <button class="btn btn-primary" onclick="handleAuth()" style="width: 280px;">MASUK KE DUNIA MASTERY</button>
</div>

<div class="container" id="main-content" style="opacity: 0;">
    
    <div class="side">
        <div class="card">
            <h2 id="user-display" style="font-size: 18px;">Profile</h2>
            <p id="rank-display" style="color: var(--gold); font-size: 12px; margin-bottom: 15px;"></p>
            <div style="font-size: 30px; font-weight: 800;" id="lvl-display">LVL 1</div>
            <div style="font-size: 11px; color: var(--text-dim);">XP Harian: <span id="daily-exp">0</span>/200</div>
            
            <div class="stat-box"><small>Logic</small><span class="stat-val" id="st-logic">0</span></div>
            <div class="stat-box"><small>Discipline</small><span class="stat-val" id="st-disc">0</span></div>
            <div class="stat-box"><small>Leadership</small><span class="stat-val" id="st-lead">0</span></div>
            <div class="stat-box"><small>Creativity</small><span class="stat-val" id="st-creat">0</span></div>
            
            <button onclick="logout()" style="margin-top: 20px; background: none; border: 1px solid #f85149; color: #f85149; padding: 5px; width: 100%; border-radius: 5px; font-size: 10px; cursor: pointer;">LOGOUT</button>
        </div>
    </div>

    <div>
        <div class="card">
            <h3>⚔️ Active Quests</h3>
            <div id="quest-list" style="margin-top: 15px;"></div>
        </div>

        <div class="card">
            <h3>🌍 Global Activity Feed</h3>
            <div id="global-feed" style="margin-top: 15px; max-height: 400px; overflow-y: auto;">
                <p style="color: var(--text-dim); font-size: 12px;">Menunggu aktivitas warga...</p>
            </div>
        </div>
    </div>

    <div class="side">
        <div class="card">
            <h3>Add Quest</h3>
            <div style="margin-top: 15px;">
                <label>Misi</label>
                <input type="text" id="q-title" placeholder="Contoh: Push Up 50x">
                <label>Bukti (Link/Teks)</label>
                <input type="text" id="q-note" placeholder="Tulis bukti kerja">
                <label>Skill</label>
                <select id="q-type">
                    <option value="logic">Logic</option>
                    <option value="discipline">Discipline</option>
                    <option value="lead">Leadership</option>
                    <option value="creat">Creativity</option>
                </select>
                <button class="btn btn-add" onclick="addNewQuest()">Mulai</button>
            </div>
        </div>

        <div class="card">
            <h3>🏆 Leaderboard</h3>
            <table style="width: 100%; font-size: 12px; margin-top: 10px;">
                <tbody id="leaderboard-body"></tbody>
            </table>
        </div>
    </div>

</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc, updateDoc, collection, query, orderBy, limit, onSnapshot, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCxZwRW5WvmSVffmN_0ieJEuZYeDOO9j1w",
        authDomain: "masterypath-3c32f.firebaseapp.com",
        projectId: "masterypath-3c32f",
        storageBucket: "masterypath-3c32f.firebasestorage.app",
        messagingSenderId: "706432336461",
        appId: "1:706432336461:web:0496bbe0d544b1d8d1d204"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let userData = {};
    let currentUser = null;

    window.handleAuth = async () => {
        const email = prompt("Email:");
        const pass = prompt("Password (min 6 karakter):");
        if(!email || !pass) return;
        try {
            await signInWithEmailAndPassword(auth, email, pass);
        } catch (e) {
            if(confirm("Buat akun baru?")) {
                const res = await createUserWithEmailAndPassword(auth, email, pass);
                userData = {
                    username: email.split('@')[0], level: 1, exp: 0, dailyExp: 0, weeklyExp: 0,
                    logic: 0, discipline: 0, lead: 0, creat: 0,
                    myQuests: [], history: [], lastDailyReset: new Date().toDateString()
                };
                await setDoc(doc(db, "users", res.user.uid), userData);
            }
        }
    };

    window.logout = () => signOut(auth).then(() => location.reload());

    async function save() {
        if (currentUser) {
            await updateDoc(doc(db, "users", currentUser.uid), userData);
            updateUI();
        }
    }

    window.addNewQuest = () => {
        const title = document.getElementById('q-title').value;
        const note = document.getElementById('q-note').value;
        const type = document.getElementById('q-type').value;
        if(!title) return;

        userData.myQuests.push({
            id: Date.now(), title, note, type,
            exp: 25, unlockAt: Date.now() + (60 * 1000) // 1 menit cooldown test
        });
        document.getElementById('q-title').value = "";
        document.getElementById('q-note').value = "";
        save();
    };

    window.completeQuest = async (id) => {
        const idx = userData.myQuests.findIndex(q => q.id === id);
        const q = userData.myQuests[idx];
        if (Date.now() < q.unlockAt) return alert("Cooldown!");

        userData.exp += q.exp;
        userData.dailyExp += q.exp;
        userData.weeklyExp += q.exp;
        userData[q.type]++;
        
        // Simpan ke Feed Global
        await addDoc(collection(db, "feed"), {
            username: userData.username,
            title: q.title,
            note: q.note || "Tanpa bukti",
            timestamp: serverTimestamp()
        });

        if (userData.exp >= 100) { userData.level++; userData.exp -= 100; }
        userData.myQuests.splice(idx, 1);
        save();
    };

    function updateUI() {
        document.getElementById('main-content').style.opacity = "1";
        document.getElementById('auth-screen').style.display = "none";
        document.getElementById('user-display').innerText = userData.username;
        document.getElementById('lvl-display').innerText = `LVL ${userData.level}`;
        document.getElementById('daily-exp').innerText = userData.dailyExp;
        document.getElementById('st-logic').innerText = userData.logic;
        document.getElementById('st-disc').innerText = userData.discipline;
        document.getElementById('st-lead').innerText = userData.lead;
        document.getElementById('st-creat').innerText = userData.creat;

        document.getElementById('quest-list').innerHTML = userData.myQuests.map(q => `
            <div class="quest-item">
                <div><strong>${q.title}</strong><br><small style="color:var(--text-dim)">Bukti: ${q.note || '-'}</small></div>
                <button class="btn btn-primary" style="width:auto; padding:5px 10px;" onclick="completeQuest(${q.id})">Selesai</button>
            </div>
        `).join('');
    }

    // LISTENER FEED GLOBAL
    onSnapshot(query(collection(db, "feed"), orderBy("timestamp", "desc"), limit(10)), (snap) => {
        document.getElementById('global-feed').innerHTML = snap.docs.map(doc => {
            const d = doc.data();
            return `
                <div class="feed-item">
                    <div style="font-size:12px;"><strong>@${d.username}</strong> baru saja menyelesaikan:</div>
                    <div style="color:var(--primary); font-weight:bold;">${d.title}</div>
                    <div style="font-size:11px; color:var(--text-dim); margin-top:4px;">" ${d.note} "</div>
                </div>
            `;
        }).join('');
    });

    // LISTENER LEADERBOARD
    onSnapshot(query(collection(db, "users"), orderBy("weeklyExp", "desc"), limit(5)), (snap) => {
        document.getElementById('leaderboard-body').innerHTML = snap.docs.map((doc, i) => `
            <tr><td>#${i+1}</td><td>${doc.data().username}</td><td align="right">${doc.data().weeklyExp} XP</td></tr>
        `).join('');
    });

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = user;
            const d = await getDoc(doc(db, "users", user.uid));
            if (d.exists()) { userData = d.data(); updateUI(); }
        } else {
            document.getElementById('auth-screen').style.display = "flex";
        }
    });
</script>
</body>
</html>
