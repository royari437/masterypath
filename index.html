<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MasteryPath v6.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d1117; --surface: #161b22; --primary: #58a6ff;
            --accent: #238636; --text: #c9d1d9; --text-dim: #8b949e; --gold: #f1e05a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 80px; }
        
        /* Navigation */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--surface); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #30363d; z-index: 1000; }
        .nav-item { color: var(--text-dim); text-decoration: none; font-size: 12px; font-weight: 600; cursor: pointer; text-align: center; flex: 1; }
        .nav-item.active { color: var(--primary); }

        /* Container & Tabs */
        .container { max-width: 600px; margin: auto; padding: 20px; }
        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: var(--surface); padding: 20px; border-radius: 15px; border: 1px solid #30363d; margin-bottom: 20px; }
        
        /* Custom UI */
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .stat-box { background: #0d1117; padding: 12px; border-radius: 10px; border: 1px solid #21262d; text-align: center; }
        .stat-val { font-size: 20px; font-weight: 800; color: var(--primary); }

        label { display: block; font-size: 10px; margin-bottom: 5px; color: var(--text-dim); text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; background: #0d1117; border: 1px solid #30363d; color: white; outline: none; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: 800; cursor: pointer; font-size: 14px; transition: 0.2s; }
        .btn-add { background: var(--accent); color: white; }
        .btn-primary { background: var(--primary); color: #000; }

        .feed-item { background: var(--surface); padding: 15px; border-radius: 12px; margin-bottom: 12px; border: 1px solid #30363d; border-left: 4px solid var(--gold); }
        .quest-card { background: #0d1117; padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #30363d; display: flex; justify-content: space-between; align-items: center; }

        .login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 2000; }
    </style>
</head>
<body>

<div id="auth-screen" class="login-overlay" style="display: none;">
    <h1 style="color: var(--primary); font-size: 32px; margin-bottom: 20px;">MasteryPath</h1>
    <button class="btn btn-primary" onclick="handleAuth()" style="width: 80%;">LOG IN / REGISTER</button>
</div>

<nav class="bottom-nav" id="navbar" style="display: none;">
    <div class="nav-item active" onclick="showTab('home', this)">🏠<br>Home</div>
    <div class="nav-item" onclick="showTab('quests', this)">⚔️<br>Quests</div>
    <div class="nav-item" onclick="showTab('profile', this)">👤<br>Profile</div>
</nav>

<div class="container" id="main-content" style="opacity: 0;">
    
    <div id="home" class="tab-content active">
        <h2 style="margin-bottom: 20px;">Global Feed</h2>
        <div id="global-feed"></div>
    </div>

    <div id="quests" class="tab-content">
        <div class="card">
            <h3>Add New Quest</h3><br>
            <input type="text" id="q-title" placeholder="Nama Misi...">
            <input type="text" id="q-note" placeholder="Bukti / Link...">
            <label>Skill</label>
            <select id="q-type">
                <option value="logic">Logic</option>
                <option value="discipline">Discipline</option>
                <option value="lead">Leadership</option>
                <option value="creat">Creativity</option>
            </select>
            <button class="btn btn-add" onclick="addNewQuest()">Mulai Misi Sekarang</button>
        </div>
        <h3>Active Quests</h3><br>
        <div id="quest-list"></div>
    </div>

    <div id="profile" class="tab-content">
        <div class="card" style="text-align: center;">
            <h2 id="user-display">User</h2>
            <p id="rank-display" style="color: var(--gold); margin: 10px 0; font-weight: bold;"></p>
            <div style="font-size: 40px; font-weight: 800; color: var(--primary);" id="lvl-display">LVL 1</div>
            <div style="font-size: 12px; color: var(--text-dim);">Daily: <span id="daily-exp">0</span>/200 XP</div>
            
            <div class="stat-grid">
                <div class="stat-box"><small>Logic</small><br><span class="stat-val" id="st-logic">0</span></div>
                <div class="stat-box"><small>Disc</small><br><span class="stat-val" id="st-disc">0</span></div>
                <div class="stat-box"><small>Lead</small><br><span class="stat-val" id="st-lead">0</span></div>
                <div class="stat-box"><small>Creat</small><br><span class="stat-val" id="st-creat">0</span></div>
            </div>
            <button onclick="logout()" style="margin-top: 15px; background: none; border: none; color: #f85149; font-size: 11px; cursor: pointer;">LOGOUT ACCOUNT</button>
        </div>

        <h3>Leaderboard</h3><br>
        <div id="leaderboard-list"></div>
    </div>

</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc, updateDoc, collection, query, orderBy, limit, onSnapshot, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCxZwRW5WvmSVffmN_0ieJEuZYeDOO9j1w",
        authDomain: "masterypath-3c32f.firebaseapp.com",
        projectId: "masterypath-3c32f",
        storageBucket: "masterypath-3c32f.firebasestorage.app",
        messagingSenderId: "706432336461",
        appId: "1:706432336461:web:0496bbe0d544b1d8d1d204"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let userData = {};
    let currentUser = null;

    // --- TAB NAVIGATION ---
    window.showTab = (tabId, el) => {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        el.classList.add('active');
        window.scrollTo(0,0);
    };

    window.handleAuth = async () => {
        const email = prompt("Email:");
        const pass = prompt("Password:");
        if(!email || !pass) return;
        try {
            await signInWithEmailAndPassword(auth, email, pass);
        } catch (e) {
            if(confirm("Buat akun baru?")) {
                const res = await createUserWithEmailAndPassword(auth, email, pass);
                userData = { username: email.split('@')[0], level: 1, exp: 0, dailyExp: 0, weeklyExp: 0, logic: 0, discipline: 0, lead: 0, creat: 0, myQuests: [], lastDailyReset: new Date().toDateString() };
                await setDoc(doc(db, "users", res.user.uid), userData);
            }
        }
    };

    window.logout = () => signOut(auth).then(() => location.reload());

    async function save() {
        if (currentUser) {
            await updateDoc(doc(db, "users", currentUser.uid), userData);
            updateUI();
        }
    }

    window.addNewQuest = () => {
        const title = document.getElementById('q-title').value;
        const note = document.getElementById('q-note').value;
        const type = document.getElementById('q-type').value;
        if(!title) return;
        userData.myQuests.push({ id: Date.now(), title, note, type, exp: 25, unlockAt: Date.now() + 60000 });
        document.getElementById('q-title').value = "";
        document.getElementById('q-note').value = "";
        save();
        alert("Misi ditambahkan! Cek tab Quests.");
    };

    window.completeQuest = async (id) => {
        const idx = userData.myQuests.findIndex(q => q.id === id);
        const q = userData.myQuests[idx];
        if (Date.now() < q.unlockAt) return alert("Masih Cooldown!");
        
        userData.exp += q.exp;
        userData.dailyExp += q.exp;
        userData.weeklyExp += q.exp;
        userData[q.type]++;
        
        await addDoc(collection(db, "feed"), { username: userData.username, title: q.title, note: q.note || "Tanpa bukti", timestamp: serverTimestamp() });

        if (userData.exp >= 100) { userData.level++; userData.exp -= 100; }
        userData.myQuests.splice(idx, 1);
        save();
    };

    function updateUI() {
        document.getElementById('main-content').style.opacity = "1";
        document.getElementById('auth-screen').style.display = "none";
        document.getElementById('navbar').style.display = "flex";
        document.getElementById('user-display').innerText = userData.username;
        document.getElementById('lvl-display').innerText = `LVL ${userData.level}`;
        document.getElementById('daily-exp').innerText = userData.dailyExp;
        document.getElementById('st-logic').innerText = userData.logic;
        document.getElementById('st-disc').innerText = userData.discipline;
        document.getElementById('st-lead').innerText = userData.lead;
        document.getElementById('st-creat').innerText = userData.creat;
        
        let badge = "🌱 Aspirant";
        if(userData.logic >= 10) badge = "🎓 Logic Wizard";
        document.getElementById('rank-display').innerText = badge;

        document.getElementById('quest-list').innerHTML = userData.myQuests.map(q => `
            <div class="quest-card">
                <div><strong>${q.title}</strong><br><small style="color:var(--text-dim)">${q.type.toUpperCase()}</small></div>
                <button class="btn btn-primary" style="width:auto; padding:8px 15px;" onclick="completeQuest(${q.id})">DONE</button>
            </div>
        `).join('') || '<p style="color:var(--text-dim)">Tidak ada misi aktif.</p>';
    }

    onSnapshot(query(collection(db, "feed"), orderBy("timestamp", "desc"), limit(15)), (snap) => {
        document.getElementById('global-feed').innerHTML = snap.docs.map(doc => `
            <div class="feed-item">
                <small>@${doc.data().username}</small>
                <div style="font-weight:800; color:var(--primary); margin:2px 0;">${doc.data().title}</div>
                <div style="font-size:11px; color:var(--text-dim)">"${doc.data().note}"</div>
            </div>
        `).join('');
    });

    onSnapshot(query(collection(db, "users"), orderBy("weeklyExp", "desc"), limit(10)), (snap) => {
        document.getElementById('leaderboard-list').innerHTML = snap.docs.map((doc, i) => `
            <div class="quest-card" style="margin-bottom:5px; border-left: ${currentUser && doc.id === currentUser.uid ? '4px solid var(--primary)' : 'none'}">
                <span>#${i+1} ${doc.data().username}</span>
                <span style="color:var(--gold)">${doc.data().weeklyExp} XP</span>
            </div>
        `).join('');
    });

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = user;
            const d = await getDoc(doc(db, "users", user.uid));
            if (d.exists()) { userData = d.data(); updateUI(); }
        } else {
            document.getElementById('auth-screen').style.display = "flex";
        }
    });
</script>
</body>
</html>
