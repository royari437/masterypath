<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MasteryPath - Growth Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d1117; --surface: #161b22; --primary: #58a6ff;
            --accent: #238636; --text: #c9d1d9; --text-dim: #8b949e; --gold: #f1e05a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); padding: 20px; line-height: 1.5; }
        .container { max-width: 1000px; margin: auto; display: grid; grid-template-columns: 1fr 350px; gap: 20px; }
        .full-width { grid-column: 1 / -1; }
        .card { background: var(--surface); padding: 20px; border-radius: 15px; border: 1px solid #30363d; margin-bottom: 20px; }
        
        /* Stats */
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 15px; }
        .stat-item { text-align: center; background: #0d1117; padding: 10px; border-radius: 10px; border-bottom: 3px solid var(--primary); }
        .stat-val { font-size: 18px; font-weight: 800; display: block; }

        /* Forms */
        label { display: block; font-size: 11px; margin-bottom: 5px; color: var(--text-dim); text-transform: uppercase; }
        input, select { width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 8px; background: #0d1117; border: 1px solid #30363d; color: white; outline: none; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: #000; }
        .btn-add { background: var(--accent); color: white; }

        /* Items */
        .quest-item { background: #0d1117; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid var(--primary); }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; color: var(--text-dim); font-size: 12px; padding: 10px 5px; border-bottom: 1px solid #30363d; }
        td { padding: 10px 5px; border-bottom: 1px solid #21262d; font-size: 14px; }

        @media (max-width: 850px) { .container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <div class="card full-width">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div>
                <h1 style="color: var(--primary);">Character Profile</h1>
                <p style="font-size: 12px; color: var(--gold);">🔥 Daily XP: <span id="daily-exp">0</span> / 200</p>
            </div>
            <div style="text-align: right;">
                <div id="lvl-display" style="font-size: 32px; font-weight: 800;">LVL 1</div>
                <small id="xp-total-display">0 / 100 XP</small>
            </div>
        </div>
        <div class="stats-grid">
            <div class="stat-item"><small>Logic</small><span class="stat-val" id="st-logic">0</span></div>
            <div class="stat-item"><small>Discipline</small><span class="stat-val" id="st-disc">0</span></div>
            <div class="stat-item"><small>Lead</small><span class="stat-val" id="st-lead">0</span></div>
            <div class="stat-item"><small>Creat</small><span class="stat-val" id="st-creat">0</span></div>
        </div>
    </div>

    <div>
        <div class="card">
            <h3>⚔️ Active Quests</h3>
            <div id="quest-list" style="margin-top: 15px;"></div>
        </div>

        <div class="card">
            <div style="display: flex; justify-content: space-between;">
                <h3>🏆 Weekly Leaderboard</h3>
                <small id="reset-timer" style="color: var(--gold);">Reset in: Monday</small>
            </div>
            <table>
                <thead>
                    <tr><th>Rank</th><th>Player</th><th style="text-align:right;">Weekly XP</th></tr>
                </thead>
                <tbody id="leaderboard-body"></tbody>
            </table>
        </div>

        <div class="card" style="opacity: 0.7;">
            <h3>📜 Mastery History</h3>
            <div id="history-list" style="max-height: 150px; overflow-y: auto; margin-top: 10px;"></div>
        </div>
    </div>

    <div class="card" style="position: sticky; top: 20px;">
        <h3>Add New Quest</h3>
        <div style="margin-top: 15px;">
            <label>Misi</label>
            <input type="text" id="q-title" placeholder="Contoh: Belajar Java Dasar">
            
            <label>Bidang</label>
            <select id="q-type">
                <option value="logic">Logic (Math/IT)</option>
                <option value="discipline">Discipline (Habit)</option>
                <option value="lead">Leadership (Org)</option>
                <option value="creat">Creativity (Idea)</option>
            </select>

            <label>Waktu & Kesulitan</label>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <select id="q-time">
                    <option value="1">30 Menit</option>
                    <option value="2">2 Jam</option>
                    <option value="3">3 Jam+</option>
                </select>
                <select id="q-diff">
                    <option value="1">Easy</option>
                    <option value="2">Medium</option>
                    <option value="3">Hard</option>
                </select>
            </div>

            <button class="btn btn-add" onclick="addNewQuest()">Tambahkan Misi</button>
        </div>
    </div>
</div>

<script>
    // --- 1. DATA STATE ---
    let userData = JSON.parse(localStorage.getItem('masterypath_data')) || {
        level: 1, exp: 0, dailyExp: 0, weeklyExp: 0,
        lastDailyReset: new Date().toDateString(),
        lastWeeklyReset: "",
        logic: 0, discipline: 0, lead: 0, creat: 0,
        myQuests: [], history: []
    };

    const DAILY_LIMIT = 200;

    // --- 2. CORE LOGIC ---
    function save() {
        localStorage.setItem('masterypath_data', JSON.stringify(userData));
        updateUI();
    }

    function checkResets() {
        const now = new Date();
        const todayStr = now.toDateString();

        // Daily Reset
        if (userData.lastDailyReset !== todayStr) {
            userData.dailyExp = 0;
            userData.lastDailyReset = todayStr;
        }

        // Weekly Reset (Setiap Senin)
        const day = now.getDay();
        const diff = now.getDate() - day + (day === 0 ? -6 : 1);
        const mondayStr = new Date(now.setDate(diff)).toDateString();
        if (userData.lastWeeklyReset !== mondayStr) {
            userData.weeklyExp = 0;
            userData.lastWeeklyReset = mondayStr;
        }
    }

    function addNewQuest() {
        const title = document.getElementById('q-title').value;
        const type = document.getElementById('q-type').value;
        const time = parseInt(document.getElementById('q-time').value);
        const diff = parseInt(document.getElementById('q-diff').value);

        if (!title) return alert("Tulis misi kamu!");

        const xp = (time * 15) + (diff * 10);
        const cooldown = time * 1 * 60 * 1000; // 1 Skala = 1 Menit (Testing)

        userData.myQuests.push({
            id: Date.now(),
            title: title,
            type: type,
            exp: xp,
            unlockAt: Date.now() + cooldown
        });

        document.getElementById('q-title').value = "";
        save();
    }

    function completeQuest(id) {
        const idx = userData.myQuests.findIndex(q => q.id === id);
        const q = userData.myQuests[idx];
        const now = Date.now();

        if (now < q.unlockAt) {
            const wait = Math.ceil((q.unlockAt - now) / 1000);
            return alert(`⏳ Cooldown! Tunggu ${wait} detik lagi.`);
        }

        if (userData.dailyExp + q.exp > DAILY_LIMIT) {
            return alert("🚫 Daily XP Limit tercapai! Lanjut besok.");
        }

        // Update Stats
        userData.exp += q.exp;
        userData.dailyExp += q.exp;
        userData.weeklyExp += q.exp;
        userData[q.type]++;

        // History
        userData.history.push({
            title: q.title, exp: q.exp, 
            time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})
        });

        // Level Up
        if (userData.exp >= 100) {
            userData.level++;
            userData.exp -= 100;
            alert("✨ LEVEL UP!");
        }

        userData.myQuests.splice(idx, 1);
        save();
    }

    // --- 3. UI RENDERING ---
    function updateUI() {
        checkResets();
        
        // Header Info
        document.getElementById('lvl-display').innerText = `LVL ${userData.level}`;
        document.getElementById('xp-total-display').innerText = `${userData.exp} / 100 XP`;
        document.getElementById('daily-exp').innerText = userData.dailyExp;
        
        // Stats
        document.getElementById('st-logic').innerText = userData.logic;
        document.getElementById('st-disc').innerText = userData.discipline;
        document.getElementById('st-lead').innerText = userData.lead;
        document.getElementById('st-creat').innerText = userData.creat;

        // Active Quests
        const qList = document.getElementById('quest-list');
        qList.innerHTML = userData.myQuests.length ? userData.myQuests.map(q => `
            <div class="quest-item">
                <div>
                    <small style="color:var(--text-dim)">[${q.type.toUpperCase()}]</small><br>
                    <strong>${q.title}</strong><br>
                    <small style="color:var(--primary)">+${q.exp} XP</small>
                </div>
                <button class="btn btn-primary" style="width:auto; padding: 5px 15px;" onclick="completeQuest(${q.id})">Selesai</button>
            </div>
        `).join('') : '<p style="color:var(--text-dim)">Tidak ada misi aktif.</p>';

        // Leaderboard (Simulation)
        const players = [
            { name: "Ahmad (You)", xp: userData.weeklyExp, me: true },
            { name: "Budi_ITS", xp: 150, me: false },
            { name: "Siti_Math", xp: 110, me: false }
        ].sort((a,b) => b.xp - a.xp);

        document.getElementById('leaderboard-body').innerHTML = players.map((p, i) => `
            <tr style="${p.me ? 'background:#23863622' : ''}">
                <td>${i+1}</td>
                <td style="color:${p.me ? 'var(--primary)' : 'white'}">${p.name}</td>
                <td style="text-align:right;">${p.xp} XP</td>
            </tr>
        `).join('');

        // History
        document.getElementById('history-list').innerHTML = userData.history.map(h => `
            <div style="font-size:12px; border-bottom:1px solid #21262d; padding:5px 0;">
                ✓ ${h.title} (+${h.exp} XP) <span style="float:right">${h.time}</span>
            </div>
        `).reverse().join('');
    }

    updateUI();
</script>

</body>
</html>
