<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MasteryPath v8.0 - Streak Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d1117; --surface: #161b22; --primary: #58a6ff;
            --accent: #238636; --text: #c9d1d9; --text-dim: #8b949e; 
            --gold: #f1e05a; --heart: #f85149; --streak: #ff7b72;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 100px; overflow-x: hidden; }
        
        /* Navigation */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--surface); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #30363d; z-index: 1000; box-shadow: 0 -5px 20px rgba(0,0,0,0.5); }
        .nav-item { color: var(--text-dim); font-size: 10px; font-weight: 800; cursor: pointer; text-align: center; flex: 1; transition: 0.3s; text-transform: uppercase; letter-spacing: 0.5px; }
        .nav-item.active { color: var(--primary); transform: translateY(-5px); }

        /* Container & Animation */
        .container { max-width: 500px; margin: auto; padding: 20px; }
        .tab-content { display: none; animation: slideIn 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); }
        .tab-content.active { display: block; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }

        /* Cards & UI Elements */
        .card { background: var(--surface); padding: 20px; border-radius: 20px; border: 1px solid #30363d; margin-bottom: 20px; position: relative; overflow: hidden; }
        .streak-tag { position: absolute; top: 0; right: 0; background: var(--streak); color: white; padding: 5px 15px; font-size: 10px; font-weight: 800; border-bottom-left-radius: 15px; display: flex; align-items: center; gap: 5px; }
        
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
        .stat-box { background: #0d1117; padding: 15px; border-radius: 15px; border: 1px solid #30363d; text-align: center; transition: 0.3s; }
        .stat-box:active { transform: scale(0.95); border-color: var(--primary); }
        .stat-val { font-size: 22px; font-weight: 800; color: var(--primary); display: block; }

        /* Badges */
        .badge-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .badge-item { background: var(--surface); padding: 15px 10px; border-radius: 18px; text-align: center; border: 1px solid #30363d; filter: grayscale(1); opacity: 0.2; transition: 0.5s; }
        .badge-item.unlocked { filter: grayscale(0); opacity: 1; border-color: var(--gold); background: linear-gradient(145deg, #1c2128, #161b22); box-shadow: 0 5px 15px rgba(241, 224, 90, 0.1); }
        .badge-icon { font-size: 28px; margin-bottom: 8px; display: block; }
        .badge-name { font-size: 10px; font-weight: 800; color: var(--text); }

        /* Inputs & Buttons */
        label { display: block; font-size: 10px; color: var(--text-dim); margin-bottom: 6px; font-weight: 800; margin-left: 5px; }
        input, select { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 12px; background: #0d1117; border: 1px solid #30363d; color: white; outline: none; font-family: inherit; font-size: 14px; }
        input:focus { border-color: var(--primary); }
        
        .btn { width: 100%; padding: 18px; border: none; border-radius: 15px; font-weight: 800; cursor: pointer; font-size: 14px; transition: 0.2s; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .btn-add { background: var(--accent); color: white; box-shadow: 0 5px 15px rgba(35, 134, 54, 0.3); }
        .btn-add:active { transform: scale(0.97); }
        .btn-primary { background: var(--primary); color: #000; }

        /* Feed & Items */
        .feed-item { background: var(--surface); padding: 18px; border-radius: 20px; margin-bottom: 15px; border: 1px solid #30363d; border-left: 5px solid var(--primary); }
        .respect-btn { background: #0d1117; border: 1px solid #30363d; color: var(--text); padding: 8px 16px; border-radius: 25px; font-size: 12px; font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .respect-btn.active { border-color: var(--primary); color: var(--primary); background: rgba(88, 166, 255, 0.1); }

        .quest-card { background: #0d1117; padding: 18px; border-radius: 15px; margin-bottom: 12px; border: 1px solid #30363d; display: flex; justify-content: space-between; align-items: center; }
        
        .login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 2000; padding: 40px; text-align: center; }
    </style>
</head>
<body>

<div id="auth-screen" class="login-overlay" style="display: none;">
    <h1 style="color: var(--primary); font-size: 42px; font-weight: 800; margin-bottom: 10px;">MasteryPath</h1>
    <p style="color: var(--text-dim); font-size: 14px; margin-bottom: 40px;">Ubah hidupmu menjadi video game nyata.</p>
    <button class="btn btn-primary" onclick="handleAuth()">MULAI PETUALANGAN</button>
</div>

<nav class="bottom-nav" id="navbar" style="display: none;">
    <div class="nav-item active" onclick="showTab('home', this)">🌍<br>Feed</div>
    <div class="nav-item" onclick="showTab('quests', this)">⚔️<br>Misi</div>
    <div class="nav-item" onclick="showTab('achievements', this)">🏆<br>Badge</div>
    <div class="nav-item" onclick="showTab('profile', this)">👤<br>Profil</div>
</nav>

<div class="container" id="main-content" style="opacity: 0;">

<div id="home" class="tab-content active">
        <h2 style="margin-bottom: 20px; font-weight: 800;">Global Activity</h2>
        <div id="global-feed"></div>
    </div>

    <div id="quests" class="tab-content">
        <div class="card">
            <h3 style="margin-bottom: 15px;">New Mission</h3>
            <label>Judul Misi</label>
            <input type="text" id="q-title" placeholder="Contoh: Belajar JavaScript">
            <label>Bukti / Link Kerja</label>
            <input type="text" id="q-note" placeholder="Link github atau catatan singkat">
            <label>Bidang Keahlian</label>
            <select id="q-type">
                <option value="logic">Logic (IT/Math)</option>
                <option value="discipline">Discipline (Habit)</option>
                <option value="lead">Leadership (Social)</option>
                <option value="creat">Creativity (Art)</option>
            </select>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div><label>Durasi</label><select id="q-time"><option value="1">30 Mnt</option><option value="2">2 Jam</option><option value="3">3 Jam+</option></select></div>
                <div><label>Kesulitan</label><select id="q-diff"><option value="1">Easy</option><option value="2">Medium</option><option value="3">Hard</option></select></div>
            </div>
            <button class="btn btn-add" onclick="addNewQuest()">MULAI MISI</button>
        </div>
        <h3 style="margin-bottom: 15px;">Misi Aktif</h3>
        <div id="quest-list"></div>
    </div>

    <div id="achievements" class="tab-content">
        <h2 style="margin-bottom: 20px;">Gallery Badge</h2>
        <div class="badge-grid" id="badge-container"></div>
    </div>

    <div id="profile" class="tab-content">
        <div class="card" style="text-align: center;">
            <div class="streak-tag" id="streak-display">🔥 0 Days</div>
            <h2 id="user-display" style="font-size: 24px;">User</h2>
            <div style="font-size: 48px; font-weight: 800; color: var(--primary); margin: 15px 0;" id="lvl-display">LVL 1</div>
            <div style="font-size: 12px; color: var(--text-dim); margin-bottom: 20px;">Daily Progress: <span id="daily-exp">0</span>/200 XP</div>
            
            <div class="stat-grid">
                <div class="stat-box"><small style="color:var(--text-dim)">Logic</small><span class="stat-val" id="st-logic">0</span></div>
                <div class="stat-box"><small style="color:var(--text-dim)">Disc</small><span class="stat-val" id="st-disc">0</span></div>
                <div class="stat-box"><small style="color:var(--text-dim)">Lead</small><span class="stat-val" id="st-lead">0</span></div>
                <div class="stat-box"><small style="color:var(--text-dim)">Creat</small><span class="stat-val" id="st-creat">0</span></div>
            </div>
            <button onclick="logout()" style="margin-top: 25px; background: none; border: none; color: var(--heart); font-size: 11px; font-weight: 800; letter-spacing: 1px; cursor: pointer;">SIGN OUT</button>
        </div>

        <h3 style="margin-bottom: 15px;">Global Leaderboard</h3>
        <div id="leaderboard-list"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc, updateDoc, collection, query, orderBy, limit, onSnapshot, addDoc, serverTimestamp, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCxZwRW5WvmSVffmN_0ieJEuZYeDOO9j1w",
        authDomain: "masterypath-3c32f.firebaseapp.com",
        projectId: "masterypath-3c32f",
        storageBucket: "masterypath-3c32f.firebasestorage.app",
        messagingSenderId: "706432336461",
        appId: "1:706432336461:web:0496bbe0d544b1d8d1d204"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let userData = {};
    let currentUser = null;

    const BADGES = [
        {id:'b1', icon:'🐣', name:'First Step', goal: 1},
        {id:'b2', icon:'🔥', name:'3 Day Streak', stat:'streak', goal: 3},
        {id:'b3', icon:'🧠', name:'Logic Expert', stat:'logic', goal: 10},
        {id:'b4', icon:'🛡️', name:'Iron Will', stat:'discipline', goal: 10},
        {id:'b5', icon:'👑', name:'Level 10', stat:'level', goal: 10}
    ];

    window.showTab = (tabId, el) => {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        el.classList.add('active');
        window.scrollTo(0,0);
    };

    window.handleAuth = async () => {
        const email = prompt("Email:");
        const pass = prompt("Password (min 6 char):");
        if(!email || !pass) return;
        try {
            await signInWithEmailAndPassword(auth, email, pass);
        } catch (e) {
            if(confirm("Daftar akun baru?")) {
                const res = await createUserWithEmailAndPassword(auth, email, pass);
                userData = { 
                    username: email.split('@')[0], level: 1, exp: 0, dailyExp: 0, weeklyExp: 0, 
                    logic: 0, discipline: 0, lead: 0, creat: 0, totalQuests: 0, streak: 0,
                    myQuests: [], lastDailyReset: new Date().toDateString(), lastLogin: new Date().toDateString()
                };
                await setDoc(doc(db, "users", res.user.uid), userData);
            }
        }
    };

    window.logout = () => signOut(auth).then(() => location.reload());

    window.addNewQuest = async () => {
        const t = document.getElementById('q-title').value;
        const n = document.getElementById('q-note').value;
        const type = document.getElementById('q-type').value;
        const time = parseInt(document.getElementById('q-time').value);
        const diff = parseInt(document.getElementById('q-diff').value);
        if(!t) return alert("Isi judul misi!");

        const xp = (time * 15) + (diff * 10);
        userData.myQuests.push({ id: Date.now(), title: t, note: n, type, exp: xp, unlockAt: Date.now() + (time * 60000) });
        await updateDoc(doc(db, "users", currentUser.uid), { myQuests: userData.myQuests });
        document.getElementById('q-title').value = ""; document.getElementById('q-note').value = "";
    };

    window.completeQuest = async (id) => {
        const idx = userData.myQuests.findIndex(q => q.id === id);
        if (idx === -1) return;
        
        const q = userData.myQuests[idx];
        
        // Cek Cooldown
        if (Date.now() < q.unlockAt) {
            const rem = Math.ceil((q.unlockAt - Date.now()) / 1000);
            return alert(`⏳ Sabar! Tunggu ${rem} detik lagi.`);
        }

        try {
            // 1. Tambahkan ke Feed Global TERLEBIH DAHULU
            await addDoc(collection(db, "feed"), { 
                userId: currentUser.uid, 
                username: userData.username || "Anonymous", 
                title: q.title, 
                note: q.note || "Misi selesai!", 
                respects: [], 
                timestamp: serverTimestamp() 
            });

            // 2. Update Data User
            userData.exp += q.exp;
            userData.dailyExp += q.exp;
            userData.weeklyExp += q.exp;
            userData[q.type] = (userData[q.type] || 0) + 1;
            userData.totalQuests = (userData.totalQuests || 0) + 1;

            if (userData.exp >= 100) { 
                userData.level++; 
                userData.exp -= 100; 
                alert("🎉 LEVEL UP!");
            }

            // 3. Hapus dari daftar misi aktif
            userData.myQuests.splice(idx, 1);

            // 4. Simpan ke Cloud
            await updateDoc(doc(db, "users", currentUser.uid), userData);
            
        } catch (error) {
            console.error("Gagal menyelesaikan misi:", error);
            alert("Terjadi kesalahan koneksi. Coba lagi.");
        }
    };

    window.giveRespect = async (feedId, respecters) => {
        if (respecters.includes(currentUser.uid)) return alert("Sudah memberi respect!");
        await updateDoc(doc(db, "feed", feedId), { respects: arrayUnion(currentUser.uid) });
    };

    function checkStreak() {
        const today = new Date().toDateString();
        const last = userData.lastLogin;
        if (last === today) return;

        const yesterday = new Date();
        yesterday.setDate(yesterday.getDate() - 1);
        
        if (last === yesterday.toDateString()) {
            userData.streak++;
        } else {
            userData.streak = 1;
        }
        userData.lastLogin = today;
    }

    function updateUI() {
        checkStreak();
        document.getElementById('main-content').style.opacity = "1";
        document.getElementById('auth-screen').style.display = "none";
        document.getElementById('navbar').style.display = "flex";
        
        document.getElementById('user-display').innerText = userData.username;
        document.getElementById('lvl-display').innerText = `LVL ${userData.level}`;
        document.getElementById('streak-display').innerText = `🔥 ${userData.streak || 1} Days`;
        document.getElementById('daily-exp').innerText = userData.dailyExp;
        document.getElementById('st-logic').innerText = userData.logic;
        document.getElementById('st-disc').innerText = userData.discipline;
        document.getElementById('st-lead').innerText = userData.lead;
        document.getElementById('st-creat').innerText = userData.creat;

        document.getElementById('quest-list').innerHTML = userData.myQuests.map(q => `
            <div class="quest-card">
                <div><strong>${q.title}</strong><br><small style="color:var(--text-dim)">${q.type.toUpperCase()} • +${q.exp}XP</small></div>
                <button class="btn btn-primary" style="width:auto; padding:8px 15px;" onclick="completeQuest(${q.id})">DONE</button>
            </div>
        `).join('') || '<p align="center" style="font-size:12px; color:var(--text-dim);">Belum ada misi aktif.</p>';

        document.getElementById('badge-container').innerHTML = BADGES.map(b => {
            const unlocked = b.stat ? userData[b.stat] >= b.goal : userData.totalQuests >= b.goal;
            return `<div class="badge-item ${unlocked?'unlocked':''}"><span class="badge-icon">${b.icon}</span><span class="badge-name">${b.name}</span></div>`;
        }).join('');
    }

    onSnapshot(query(collection(db, "feed"), orderBy("timestamp", "desc"), limit(20)), (snap) => {
        document.getElementById('global-feed').innerHTML = snap.docs.map(doc => {
            const d = doc.data();
            const liked = d.respects.includes(currentUser?.uid);
            return `
                <div class="feed-item">
                    <div class="feed-header"><strong>@${d.username}</strong><button class="respect-btn ${liked?'active':''}" onclick="giveRespect('${doc.id}', ${JSON.stringify(d.respects)})">🤝 ${d.respects.length}</button></div>
                    <div style="font-weight:800; color:var(--primary);">${d.title}</div>
                    <div style="font-size:12px; color:var(--text-dim); margin-top:5px;">"${d.note}"</div>
                </div>`;
        }).join('');
    });

    onSnapshot(query(collection(db, "users"), orderBy("weeklyExp", "desc"), limit(10)), (snap) => {
        document.getElementById('leaderboard-list').innerHTML = snap.docs.map((d, i) => `
            <div class="quest-card" style="margin-bottom:8px; border-left:${currentUser&&d.id===currentUser.uid?'4px solid var(--primary)':'1px solid #30363d'}">
                <span>#${i+1} ${d.data().username}</span><span style="color:var(--gold); font-weight:800;">${d.data().weeklyExp} XP</span>
            </div>`).join('');
    });

    onAuthStateChanged(auth, u => {
        if (u) {
            currentUser = u;
            onSnapshot(doc(db, "users", u.uid), d => { if(d.exists()){ userData = d.data(); updateUI(); } });
        } else {
            document.getElementById('auth-screen').style.display = "flex";
            document.getElementById('navbar').style.display = "none";
        }
    });
</script>
</body>
</html>
