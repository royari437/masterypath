<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MasteryPath v7.1 - Fixed</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d1117; --surface: #161b22; --primary: #58a6ff;
            --accent: #238636; --text: #c9d1d9; --text-dim: #8b949e; --gold: #f1e05a; --heart: #f85149;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 90px; }
        
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--surface); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #30363d; z-index: 1000; }
        .nav-item { color: var(--text-dim); font-size: 11px; font-weight: 600; cursor: pointer; text-align: center; flex: 1; transition: 0.2s; }
        .nav-item.active { color: var(--primary); transform: translateY(-3px); }

        .container { max-width: 600px; margin: auto; padding: 20px; }
        .tab-content { display: none; animation: slideUp 0.3s ease-out; }
        .tab-content.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: var(--surface); padding: 20px; border-radius: 16px; border: 1px solid #30363d; margin-bottom: 20px; }
        
        .badge-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .badge-item { background: #0d1117; padding: 10px; border-radius: 12px; text-align: center; border: 1px solid #30363d; opacity: 0.3; transition: 0.3s; filter: grayscale(1); }
        .badge-item.unlocked { opacity: 1; filter: grayscale(0); border-color: var(--gold); background: rgba(241, 224, 90, 0.05); }
        .badge-icon { font-size: 24px; display: block; margin-bottom: 5px; }
        .badge-name { font-size: 9px; font-weight: 800; color: var(--text); display: block; }

        .feed-item { background: var(--surface); padding: 15px; border-radius: 16px; margin-bottom: 12px; border: 1px solid #30363d; }
        .feed-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
        .respect-btn { background: #0d1117; border: 1px solid #30363d; color: var(--text); padding: 6px 12px; border-radius: 20px; font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 5px; transition: 0.2s; }
        .respect-btn.active { border-color: var(--primary); color: var(--primary); background: rgba(88, 166, 255, 0.1); }

        .quest-card { background: #0d1117; padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #30363d; display: flex; justify-content: space-between; align-items: center; }
        .stat-val { font-size: 20px; font-weight: 800; color: var(--primary); }
        
        input, select { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 10px; background: #0d1117; border: 1px solid #30363d; color: white; outline: none; font-size: 14px; }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 10px; font-weight: 800; cursor: pointer; font-size: 14px; }
        .btn-add { background: var(--accent); color: white; }
        .btn-primary { background: var(--primary); color: #000; }
        
        .login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 2000; }
    </style>
</head>
<body>

<div id="auth-screen" class="login-overlay" style="display: none;">
    <h1 style="color: var(--primary); font-size: 36px; font-weight: 800; margin-bottom: 20px;">MasteryPath</h1>
    <button class="btn btn-primary" onclick="handleAuth()" style="width: 80%;">LOG IN / REGISTER</button>
</div>

<nav class="bottom-nav" id="navbar" style="display: none;">
    <div class="nav-item active" onclick="showTab('home', this)">🏠<br>Feed</div>
    <div class="nav-item" onclick="showTab('quests', this)">⚔️<br>Quests</div>
    <div class="nav-item" onclick="showTab('achievements', this)">🏆<br>Badges</div>
    <div class="nav-item" onclick="showTab('profile', this)">👤<br>Profile</div>
</nav>

<div class="container" id="main-content" style="opacity: 0;">
    
    <div id="home" class="tab-content active">
        <h2 style="margin-bottom: 20px; font-weight: 800;">Warga Activity</h2>
        <div id="global-feed"></div>
    </div>

    <div id="quests" class="tab-content">
        <div class="card">
            <h3 style="margin-bottom: 15px;">New Mission</h3>
            <input type="text" id="q-title" placeholder="Nama Misi...">
            <input type="text" id="q-note" placeholder="Bukti / Catatan...">
            <select id="q-type">
                <option value="logic">Logic (IT/Math)</option>
                <option value="discipline">Discipline (Habit)</option>
                <option value="lead">Leadership (Social)</option>
                <option value="creat">Creativity (Art)</option>
            </select>
            <button class="btn btn-add" onclick="addNewQuest()">START MISSION</button>
        </div>
        <h3 style="margin-bottom: 15px;">Active Misi</h3>
        <div id="quest-list"></div>
    </div>

    <div id="achievements" class="tab-content">
        <h2 style="margin-bottom: 20px;">Hall of Fame</h2>
        <div class="badge-grid" id="badge-container"></div>
    </div>

    <div id="profile" class="tab-content">
        <div class="card" style="text-align: center;">
            <h2 id="user-display">User</h2>
            <div style="font-size: 48px; font-weight: 800; color: var(--primary); margin: 10px 0;" id="lvl-display">LVL 1</div>
            <div style="font-size: 12px; color: var(--text-dim); margin-bottom: 20px;">Daily: <span id="daily-exp">0</span>/200 XP</div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div style="background: #0d1117; padding: 15px; border-radius: 12px; border: 1px solid #30363d;">
                    <small style="color:var(--text-dim)">Logic</small><br><span class="stat-val" id="st-logic">0</span>
                </div>
                <div style="background: #0d1117; padding: 15px; border-radius: 12px; border: 1px solid #30363d;">
                    <small style="color:var(--text-dim)">Disc</small><br><span class="stat-val" id="st-disc">0</span>
                </div>
            </div>
            <button onclick="logout()" style="margin-top: 20px; background: none; border: none; color: var(--heart); font-size: 12px; cursor: pointer; font-weight: bold;">SIGN OUT</button>
        </div>
        <h3>Leaderboard</h3><br>
        <div id="leaderboard-list"></div>
    </div>

</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc, updateDoc, collection, query, orderBy, limit, onSnapshot, addDoc, serverTimestamp, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCxZwRW5WvmSVffmN_0ieJEuZYeDOO9j1w",
        authDomain: "masterypath-3c32f.firebaseapp.com",
        projectId: "masterypath-3c32f",
        storageBucket: "masterypath-3c32f.firebasestorage.app",
        messagingSenderId: "706432336461",
        appId: "1:706432336461:web:0496bbe0d544b1d8d1d204"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let userData = {};
    let currentUser = null;

    const ALL_BADGES = [
        { id: 'first_step', icon: '🐣', name: 'First Step', goal: 1 },
        { id: 'hard_worker', icon: '⚒️', name: 'Hard Worker', goal: 10 },
        { id: 'logic_expert', icon: '🧠', name: 'Logic Expert', stat: 'logic', goal: 10 },
        { id: 'iron_will', icon: '🛡️', name: 'Iron Will', stat: 'discipline', goal: 10 },
        { id: 'level_5', icon: '⭐', name: 'Elite User', stat: 'level', goal: 5 },
        { id: 'legend', icon: '👑', name: 'Master Legend', stat: 'level', goal: 10 }
    ];

    window.showTab = (tabId, el) => {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        el.classList.add('active');
    };

    window.handleAuth = async () => {
        const email = prompt("Email:");
        const pass = prompt("Password:");
        if(!email || !pass) return;
        try {
            await signInWithEmailAndPassword(auth, email, pass);
        } catch (e) {
            if(confirm("Daftar baru?")) {
                const res = await createUserWithEmailAndPassword(auth, email, pass);
                userData = { username: email.split('@')[0], level: 1, exp: 0, dailyExp: 0, weeklyExp: 0, logic: 0, discipline: 0, lead: 0, creat: 0, totalQuests: 0, myQuests: [], lastDailyReset: new Date().toDateString() };
                await setDoc(doc(db, "users", res.user.uid), userData);
            }
        }
    };

    window.logout = () => signOut(auth).then(() => location.reload());

    window.addNewQuest = async () => {
        const title = document.getElementById('q-title').value;
        const note = document.getElementById('q-note').value;
        const type = document.getElementById('q-type').value;
        if(!title) return;
        userData.myQuests.push({ id: Date.now(), title, note, type, exp: 25, unlockAt: Date.now() + 60000 });
        await updateDoc(doc(db, "users", currentUser.uid), { myQuests: userData.myQuests });
        document.getElementById('q-title').value = ""; document.getElementById('q-note').value = "";
    };

    window.completeQuest = async (id) => {
        const idx = userData.myQuests.findIndex(q => q.id === id);
        const q = userData.myQuests[idx];
        if (Date.now() < q.unlockAt) return alert("Sabar!");

        userData.exp += q.exp;
        userData.dailyExp += q.exp;
        userData.weeklyExp += q.exp;
        userData[q.type]++;
        userData.totalQuests = (userData.totalQuests || 0) + 1;

        await addDoc(collection(db, "feed"), { 
            userId: currentUser.uid, 
            username: userData.username, 
            title: q.title, 
            note: q.note || "Tanpa bukti", 
            respects: [] , 
            timestamp: serverTimestamp() 
        });

        if (userData.exp >= 100) { userData.level++; userData.exp -= 100; }
        userData.myQuests.splice(idx, 1);
        await updateDoc(doc(db, "users", currentUser.uid), userData);
    };

    window.giveRespect = async (feedId, respectArray) => {
        if (respectArray.includes(currentUser.uid)) return alert("Kamu sudah memberi Respect!");
        const feedRef = doc(db, "feed", feedId);
        await updateDoc(feedRef, { respects: arrayUnion(currentUser.uid) });
    };

    function updateUI() {
        document.getElementById('main-content').style.opacity = "1";
        document.getElementById('auth-screen').style.display = "none";
        document.getElementById('navbar').style.display = "flex";
        document.getElementById('user-display').innerText = userData.username;
        document.getElementById('lvl-display').innerText = `LVL ${userData.level}`;
        document.getElementById('daily-exp').innerText = userData.dailyExp;
        document.getElementById('st-logic').innerText = userData.logic;
        document.getElementById('st-disc').innerText = userData.discipline;

        document.getElementById('quest-list').innerHTML = userData.myQuests.map(q => `
            <div class="quest-card">
                <div><strong>${q.title}</strong><br><small style="color:var(--text-dim)">${q.type.toUpperCase()}</small></div>
                <button class="btn btn-primary" style="width:auto; padding:8px 15px;" onclick="completeQuest(${q.id})">DONE</button>
            </div>
        `).join('') || '<p style="color:var(--text-dim); text-align:center;">Kosong.</p>';

        document.getElementById('badge-container').innerHTML = ALL_BADGES.map(b => {
            const unlocked = b.stat ? userData[b.stat] >= b.goal : (userData.totalQuests || 0) >= b.goal;
            return `<div class="badge-item ${unlocked ? 'unlocked' : ''}"><span class="badge-icon">${b.icon}</span><span class="badge-name">${b.name}</span></div>`;
        }).join('');
    }

    onSnapshot(query(collection(db, "feed"), orderBy("timestamp", "desc"), limit(20)), (snap) => {
        document.getElementById('global-feed').innerHTML = snap.docs.map(doc => {
            const d = doc.data();
            const hasLiked = d.respects.includes(currentUser?.uid);
            return `
                <div class="feed-item">
                    <div class="feed-header">
                        <strong>@${d.username}</strong>
                        <button class="respect-btn ${hasLiked ? 'active' : ''}" onclick="giveRespect('${doc.id}', ${JSON.stringify(d.respects)})">
                            🤝 ${d.respects.length}
                        </button>
                    </div>
                    <div style="font-weight:800; color:var(--primary);">${d.title}</div>
                    <div style="font-size:12px; color:var(--text-dim); margin-top:5px;">"${d.note}"</div>
                </div>
            `;
        }).join('');
    });

    onSnapshot(query(collection(db, "users"), orderBy("weeklyExp", "desc"), limit(10)), (snap) => {
        document.getElementById('leaderboard-list').innerHTML = snap.docs.map((doc, i) => `
            <div class="quest-card" style="margin-bottom:8px; border-left: ${currentUser && doc.id === currentUser.uid ? '4px solid var(--primary)' : 'none'}">
                <span>#${i+1} ${doc.data().username}</span><span style="color:var(--gold); font-weight:800;">${doc.data().weeklyExp} XP</span>
            </div>
        `).join('');
    });

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = user;
            onSnapshot(doc(db, "users", user.uid), (d) => { if (d.exists()) { userData = d.data(); updateUI(); } });
        } else {
            document.getElementById('auth-screen').style.display = "flex";
            document.getElementById('navbar').style.display = "none";
        }
    });
</script>
</body>
</html>
